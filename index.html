<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stars - моя сторінка</title>
    <style>
        body {
    background-color: #1e2b3a;  /* темно-синій фон */
    color: white;                /* білий текст */
    font-family: Arial, sans-serif;
    padding: 3em;
            h1 {
    color: #f39c12;              /* помаранчевий */
    text-align: center;
    border-bottom: 3px solid #f39c12;
    font-size: 30px;
    padding-bottom: 10px;
            }
            h2 {color: #f1c40f;
            }
    ul {
    background-color: #34495e;   /* сіро-синій фон */
    padding: 20px;
    border-radius: 15px;
    list-style: none;
}
li {
    margin: 10px 0;
    font-size: 18px;
    border-left: 5px solid #f39c12;
    padding-left: 15px;
}
            
            iframe {
    width: 100%;
    max-width: 560px;
    height: 315px;
    display: block;
    margin: 20px auto;
    border: 4px solid #f39c12;
    border-radius: 10px;
}

            .visit-counter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f0f2f5;
    padding: 10px 20px;
    border-radius: 50px;
    font-family: sans-serif;
    font-weight: bold;
    color: #333;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.visit-counter .icon {
    font-size: 1.2rem;
}

#counter-display {
    color: #007bff; /* Синій колір для цифри */
    font-size: 1.1rem;
}

.visit-counter .label {
    font-size: 0.9rem;
    color: #666;
    font-weight: normal;
}


    </style>
</head>
<body>
    <h1>🔥 Brawl Stars — моя улюблена гра! 🔥</h1>
    <p>Brawl Stars — це командна гра, де ти обираєш бійця і змагаєшся з іншими гравцями. Дуже весело і динамічно!</p>
    <h2>⚡ Мої улюблені бійці:</h2>
    <ul>
        <li>Шеллі</li>
        <li>Кольт</li>
        <li>Спайк</li>
    </ul>
    <h2>🎬 Трейлер гри:</h2>
    <iframe width="795" height="447" src="https://www.youtube.com/embed/WuwxkkSSeug" title="Sirius - No more Brawl Stars! (Brawl Stars Animation)" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <p>Зробив Бережний Учен 8 класу на уроці інформатики 😊</p>
    <div class="visit-counter">
    <span class="icon">👁️</span>
    <span id="counter-display">0</span>
    <span class="label">переглядів</span>
</div>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
    // Отримуємо поточне значення з пам'яті браузера
    let visits = localStorage.getItem('visitCount');

    // Якщо це перший візит, встановлюємо 0
    if (visits === null) {
        visits = 0;
    }

    // Збільшуємо на 1 та зберігаємо
    visits++;
    localStorage.setItem('visitCount', visits);

    // Виводимо на сторінку
    document.getElementById('counter-display').innerText = `Ви відвідали цю сторінку ${visits} разів`;
});
        </script>

</body>
</html>
